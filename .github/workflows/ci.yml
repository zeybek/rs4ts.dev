name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Starlight's git-based "Last updated" is correct
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # `npm run build` runs starlight-links-validator, which fails the build
      # on any broken internal link or anchor.
      - run: npm run build
